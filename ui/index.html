<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2rem; color: #38bdf8; margin-bottom: 8px; }
        p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        input { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: #e2e8f0; font-size: 1rem; outline: none; transition: border 0.2s; }
        input:focus { border-color: #38bdf8; }
        button { margin-top: 30px; width: 100%; padding: 16px; background: #38bdf8; color: #0f172a; font-size: 1.1rem; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #7dd3fc; }
        .result { margin-top: 30px; padding: 24px; border-radius: 12px; text-align: center; display: none; }
        .disease { background: #450a0a; border: 1px solid #dc2626; }
        .no-disease { background: #052e16; border: 1px solid #16a34a; }
        .result h2 { font-size: 1.5rem; margin-bottom: 10px; }
        .result .confidence { font-size: 1rem; color: #94a3b8; }
        .probs { display: flex; justify-content: center; gap: 40px; margin-top: 16px; }
        .prob-item { text-align: center; }
        .prob-item span { display: block; font-size: 1.5rem; font-weight: 700; }
        .prob-item label { font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>❤️ Heart Disease Predictor</h1>
        <p class="subtitle">Enter patient data to predict heart disease risk</p>
        <div class="grid">
            <div class="field"><label>Age</label><input id="age" type="number" placeholder="63" value="63"></div>
            <div class="field"><label>Sex (0=F, 1=M)</label><input id="sex" type="number" placeholder="1" value="1"></div>
            <div class="field"><label>Chest Pain Type (0-3)</label><input id="cp" type="number" placeholder="3" value="3"></div>
            <div class="field"><label>Resting BP</label><input id="trestbps" type="number" placeholder="145" value="145"></div>
            <div class="field"><label>Cholesterol</label><input id="chol" type="number" placeholder="233" value="233"></div>
            <div class="field"><label>Fasting BS (0/1)</label><input id="fbs" type="number" placeholder="1" value="1"></div>
            <div class="field"><label>Rest ECG (0-2)</label><input id="restecg" type="number" placeholder="0" value="0"></div>
            <div class="field"><label>Max Heart Rate</label><input id="thalach" type="number" placeholder="150" value="150"></div>
            <div class="field"><label>Exercise Angina (0/1)</label><input id="exang" type="number" placeholder="0" value="0"></div>
            <div class="field"><label>Oldpeak</label><input id="oldpeak" type="number" step="0.1" placeholder="2.3" value="2.3"></div>
            <div class="field"><label>Slope (0-2)</label><input id="slope" type="number" placeholder="0" value="0"></div>
            <div class="field"><label>CA (0-4)</label><input id="ca" type="number" placeholder="0" value="0"></div>
            <div class="field"><label>Thal (0-3)</label><input id="thal" type="number" placeholder="1" value="1"></div>
        </div>
        <button onclick="predict()">🔍 Predict</button>
        <div class="result" id="result">
            <h2 id="result-text"></h2>
            <p class="confidence" id="confidence"></p>
            <div class="probs">
                <div class="prob-item"><span id="prob-no"></span><label>No Disease</label></div>
                <div class="prob-item"><span id="prob-yes"></span><label>Disease</label></div>
            </div>
        </div>
    </div>
    <script>
        async function predict() {
            const fields = ["age","sex","cp","trestbps","chol","fbs","restecg","thalach","exang","oldpeak","slope","ca","thal"];
            const data = {};
            fields.forEach(f => data[f] = parseFloat(document.getElementById(f).value));
            const res = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const json = await res.json();
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "block";
            resultDiv.className = "result " + (json.prediction === 1 ? "disease" : "no-disease");
            document.getElementById("result-text").textContent = json.result;
            document.getElementById("confidence").textContent = "Confidence: " + json.confidence;
            document.getElementById("prob-no").textContent = json.probabilities.no_disease;
            document.getElementById("prob-yes").textContent = json.probabilities.disease;
        }
    </script>
</body>
</html>
